[licenses]
allow = [
    "MIT", 
    "Apache-2.0", 
    "Apache-2.0 WITH LLVM-exception", 
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSD-3-Clause",
    "ISC",
    "Zlib"
]
deny = ["GPL-2.0", "GPL-3.0", "AGPL-3.0"]

[bans]
multiple-versions = "warn"

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
vulnerability = "deny"
unmaintained = "warn"