[licenses]
allow = [
    "MIT", 
    "Apache-2.0", 
    "Apache-2.0 WITH LLVM-exception", 
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD"
]

[bans]
multiple-versions = "warn"

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "all"
ignore = [
    "RUSTSEC-2025-0141",
]