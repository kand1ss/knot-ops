name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

jobs:
  size:
    runs-on: ubuntu-latest
    steps:
      - uses: CodelyTV/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: 'size/XS'
          xs_max_size: 10
          s_label: 'size/S'
          s_max_size: 50
          m_label: 'size/M'
          m_max_size: 200
          l_label: 'size/L'
          l_max_size: 500
          xl_label: 'size/XL'
          fail_if_xl: false

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          MSRV=$(cargo metadata --format-version 1 --no-deps | jq -r '.packages | map(select(.rust_version != null)) | .[0].rust_version')
          if [ "$MSRV" == "null" ] || [ -z "$MSRV" ]; then
            echo "MSRV not found in Cargo.toml, falling back to stable"
            MSRV="stable"
          fi
          echo "Detected MSRV: $MSRV"
          echo "version=$MSRV" >> $GITHUB_OUTPUT

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ steps.msrv.outputs.version }}

      - run: cargo check --all-features